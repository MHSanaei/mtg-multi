---

version: 2

project_name: mtg-multi

before:
  hooks:
    - go mod tidy
    - go generate ./...

# Linux and Windows release archives are built by .github/workflows/go.yml;
# goreleaser only contributes the darwin builds to avoid duplicate asset
# names on the same release.
builds:
  - id: default
    binary: mtg-multi
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -mod=readonly
    ldflags: -s -w -X main.version={{ .Version }}

archives:
  - id: default
    ids:
      - default
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    formats:
      - tar.gz
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - example.config.toml

snapshot:
  version_template: '{{ .Version }}'

checksum:
  name_template: '{{ .ProjectName }}-{{ .Version }}-darwin-checksums.txt'
